name: Auto-merge Dependabot PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  auto-merge-dependabot:
    runs-on: ubuntu-latest
    # Only run for Dependabot PRs
    if: github.actor == 'dependabot[bot]' || github.actor == 'dependabot'
    steps:
      - name: Wait for status checks
        id: wait-checks
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo, pull_number } = context.issue;
            const maxAttempts = 60; // 60 attempts * 30 seconds = 30 minutes max
            let attempts = 0;
            
            async function waitForChecks() {
              while (attempts < maxAttempts) {
                attempts++;
                
                // Get current PR status
                const { data: pr } = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number
                });
                
                console.log(`Attempt ${attempts}: state=${pr.merged}, mergeable=${pr.mergeable}`);
                
                // If already merged, exit successfully
                if (pr.merged) {
                  core.setOutput('merged', 'true');
                  return;
                }
                
                // If not mergeable, wait (might have conflicts)
                if (!pr.mergeable) {
                  console.log('PR not mergeable, waiting...');
                  await new Promise(r => setTimeout(r, 30000));
                  continue;
                }
                
                // Get combined commit status
                const { data: combinedStatus } = await github.rest.repos.getCombinedCommitStatus({
                  owner,
                  repo,
                  ref: pr.head.sha
                });
                
                console.log(`Status: ${combinedStatus.state}, checks: ${combinedStatus.statuses.length}`);
                
                if (combinedStatus.state === 'success') {
                  core.setOutput('ready', 'true');
                  return;
                }
                
                if (combinedStatus.state === 'failure') {
                  core.setFailed('Checks failed');
                  return;
                }
                
                // Still pending, wait
                await new Promise(r => setTimeout(r, 30000));
              }
              
              core.setFailed('Timeout: Checks did not complete in 30 minutes');
            }
            
            await waitForChecks();

      - name: Enable auto-merge
        if: steps.wait-checks.outputs.ready == 'true'
        run: |
          gh pr merge --admin --auto "${{ github.event.pull_request.number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report success
        if: steps.wait-checks.outputs.merged == 'true'
        run: |
          echo "✅ PR was already merged!"
          
      - name: Report status
        if: steps.wait-checks.outputs.ready == 'true'
        run: |
          echo "✅ Auto-merge enabled for PR #${{ github.event.pull_request.number }}"
          echo "PR will be automatically merged once all checks pass"
